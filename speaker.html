<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>speaker</title>
    <link rel="stylesheet" href="speaker.css">
</head>
<body>
    <section class="speakers-section">
            <h2>Meet the Speakers</h2>
            <div class="speakers-grid">
                <div class="speaker-card">
                    <img src="./assets/andrej.png" alt="">
                    <div class="card-info">
                        <span class="track ai">AI / ML</span>
                        <h3>Andrej Karpathy</h3>
                        <p>Pretraining team, Anthropic</p>
                    </div>
                </div>
                <div class="speaker-card">
                    <img src="./assets/demis.png" alt="">
                    <div class="card-info">
                        <span class="track.devops">CLOUD & DEVOPS</span>
                        <h3>Demis Hassabis</h3>
                        <p>Co-Founder and CEO, Google DeepMind</p>
                    </div>
                </div>
                <div class="speaker-card">
                    <img src="./assets/gary.png" alt="">
                    <div class="card-info">
                        <span class="track frontend">FRONTEND</span>
                        <h3>Gary Marcus</h3>
                        <p>Staff Engineer, Vercel</p>
                    </div>
                </div>
                <div class="speaker-card">
                    <img src="./assets/mustafa.png" alt="">
                    <div class="card-info">
                        <span class="track security">SECURITY</span>
                        <h3>Mustafa Suleyman</h3>
                        <p>CEO of Microsoft AI</p>
                    </div>
                </div>
            </div>
        </section>

</body>
</html>
