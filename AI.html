
<!-- I ask AI = "Create a modern and responsive newsletter subscription section for a website footer, suitable for capturing visitor emails. Please provide both the HTML and CSS code so I can easily copy and paste it into my project." -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai</title>
    <link rel="stylesheet" href="AI.css">
</head>
<body>
    <section class="newsletter">
    <div class="newsletter-container">

        <div class="newsletter-content">
            <span class="newsletter-tag">Stay Updated</span>

            <h2>Subscribe to Our Newsletter</h2>

            <p>
                Get the latest news, tutorials, tips, and exclusive updates
                delivered straight to your inbox.
            </p>
        </div>

        <form class="newsletter-form">
            <input
                type="email"
                placeholder="Enter your email address"
                required
            />

            <button type="submit">
                Subscribe
            </button>
        </form>

    </div>
</section>
</body>
</html>
